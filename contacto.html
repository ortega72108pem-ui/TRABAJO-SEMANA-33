<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Contacto</title>

<style>
body {font-family: Arial; background:#f0fff4;}

.header {
background:#38ef7d; color:white; text-align:center; padding:30px;
}

.form {
background:white; padding:20px; margin:20px;
border-radius:10px;
box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

input, textarea {
width:100%; padding:10px; margin:10px 0;
}

button {
background:#11998e; color:white; padding:10px;
border:none;
}
</style>
</head>

<body>

<div class="header">
<h1>📞 CONTACTO</h1>
</div>

<div class="form">
<input type="text" placeholder="Nombre">
<input type="email" placeholder="Correo">
<textarea placeholder="Mensaje"></textarea>
<button>Enviar</button>
</div>

</body>
</html>
